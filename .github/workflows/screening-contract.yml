name: Screening source contract

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * 1"

jobs:
  eastmoney-annual-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install .
      - run: python scripts/screening_contract_check.py
